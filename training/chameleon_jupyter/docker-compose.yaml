# Run on the Chameleon train host after setup_host.sh (rclone mount) and cloning immich-sticker-gen.
# Lives under training/ (training-owned). Create .env here with HOST_REPO and JUPYTER_TOKEN.
#
# OpenStack: allow TCP 8888 on the server's security group if you browse Jupyter via floating IP.

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: immich-sticker-jupyter:rocm
    container_name: immich-sticker-jupyter
    ports:
      - "8888:8888"
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    env_file:
      - .env
    volumes:
      - /tmp/rclone-tests/object:/data:ro
      - ${HOST_REPO}:/workspace/repo:rw
    working_dir: /workspace/repo/training
    restart: unless-stopped
