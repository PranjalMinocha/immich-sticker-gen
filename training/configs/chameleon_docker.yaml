# Chameleon: bind-mount ~/training-data (or LOCAL_DATA_ROOT) at /data — see training/README.md.
# data_dir = JPEGs (+ optional mask JSON). embeddings_dir = teacher .npy (same basename as each .jpg).

training:
  mode: full_sam
  use_pretrained: true
  pretrained_checkpoint_path: /path/to/mobile_sam.pt

mobilesam_root: null

data:
  # New mounted-bucket layout
  data_dir: /data/images
  annotation_root: /data/annotations
  objstore_local_root: /data
  train_manifest_csv: /data/dataset_manifests/train_manifest.csv
  val_manifest_csv: /data/dataset_manifests/val_manifest.csv
  embeddings_dir: /data/Teacher-Embeddings/sa_000000
  image_size: 1024
  seed: 42
  train_frac: 0.7
  val_frac: 0.1
  test_frac: 0.2
  num_workers: 4

model:
  img_size: 1024
  in_chans: 3
  num_classes: 1000
  embed_dims: [64, 128, 160, 320]
  depths: [2, 2, 6, 2]
  num_heads: [2, 4, 5, 10]
  window_sizes: [7, 7, 14, 7]
  mlp_ratio: 4.0
  drop_rate: 0.0
  drop_path_rate: 0.0
  use_checkpoint: false
  mbconv_expand_ratio: 4.0
  local_conv_size: 3
  layer_lr_decay: 0.8

train:
  epochs: 8
  batch_size: 8
  optimizer: sgd
  learning_rate: 0.05
  weight_decay: 0.0005
  momentum: 0.9
  scheduler_gamma: 0.5
  log_interval_batches: 50
  show_progress: true
  # SAM mask IoU eval (full_sam val/test; encoder_distill merged test): fraction of loader batches.
  # Omit for default 500 batches. Use 1.0 for full split (can be very slow on large data).
  # sam_instance_frac: 0.05

mlflow:
  tracking_uri: http://129.114.27.60:8000
  experiment_name: immich-sticker-encoder
  run_name: null

model_registry:
  enabled: true
  model_name: immich-sticker-mobilesam

offline_eval:
  min_dice: 0.8
  min_iou: 0.7
  max_runtime_seconds: 14400

output:
  dir: /out
