# Production-only retraining profile.
# Intended for trigger-driven runs with conservative updates.

training:
  mode: full_sam
  use_pretrained: true
  pretrained_checkpoint_path: /home/cc/training_artifacts/mobile_sam.pt

mobilesam_root: /mobilesam

data:
  data_dir: /data/images
  annotation_root: /data/annotations
  objstore_local_root: /data
  train_manifest_csv: /data/dataset_manifests/train_manifest.csv
  val_manifest_csv: /data/dataset_manifests/val_manifest.csv
  embeddings_dir: /data/Teacher-Embeddings/sa_000000
  image_size: 1024
  seed: 42
  train_frac: 0.9
  val_frac: 0.1
  test_frac: 0.0
  num_workers: 2

train:
  epochs: 2
  batch_size: 2
  optimizer: adamw
  learning_rate: 0.00001
  weight_decay: 0.01
  momentum: 0.9
  scheduler_gamma: 0.95
  log_interval_batches: 25
  show_progress: true
  sam_instance_frac: 1.0

mlflow:
  tracking_uri: http://129.114.27.60:8000
  experiment_name: immich-sticker-retraining
  run_name: null

model_registry:
  enabled: true
  model_name: immich-sticker-mobilesam
  set_production_alias: true
  production_alias: Production

offline_eval:
  min_dice: 0.75
  min_iou: 0.65
  max_runtime_seconds: 10800
  enable_boundary_gate: true
  min_boundary_f1: 0.5
  enable_prompt_robustness_gate: true
  prompt_jitter_samples: 3
  prompt_jitter_frac: 0.1
  prompt_robust_max_batches: 100
  max_prompt_iou_drop: 0.15
  min_prompt_robust_iou: 0.5
  enable_small_object_gate: true
  small_object_manifest_csv: /data/eval_subsets/small_objects_manifest.csv
  min_small_object_iou: 0.45
  enable_low_light_gate: true
  low_light_manifest_csv: /data/eval_subsets/low_light_manifest.csv
  min_low_light_iou: 0.45

output:
  dir: /out
