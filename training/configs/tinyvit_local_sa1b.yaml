# Example for local workspace: sibling MobileSAM-pytorch with sa_000000.
# Usage: python train_encoder.py --config configs/tinyvit_local_sa1b.yaml

mobilesam_root: null

data:
  root: /home/cc/sa-1b-workspace/MobileSAM-pytorch
  shard_dirs:
    - sa_000000
  image_size: 1024
  seed: 42
  train_frac: 0.7
  val_frac: 0.1
  test_frac: 0.2
  split_manifest: null
  num_workers: 4

model:
  img_size: 1024
  in_chans: 3
  num_classes: 1000
  embed_dims: [64, 128, 160, 320]
  depths: [2, 2, 6, 2]
  num_heads: [2, 4, 5, 10]
  window_sizes: [7, 7, 14, 7]
  mlp_ratio: 4.0
  drop_rate: 0.0
  drop_path_rate: 0.0
  use_checkpoint: false
  mbconv_expand_ratio: 4.0
  local_conv_size: 3
  layer_lr_decay: 0.8

train:
  epochs: 1
  batch_size: 2
  optimizer: sgd
  learning_rate: 0.05
  weight_decay: 0.0005
  momentum: 0.9
  scheduler_gamma: 0.5
  log_interval_batches: 5
  show_progress: true
  distributed_backend: gloo

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment_name: immich-sticker-encoder-local
  run_name: smoke_test

output:
  dir: /tmp/immich_sticker_training_local
