# TinyViT encoder distillation (MobileSAM-style). Override paths for your environment.
# Unified entry: python train.py --config <this file>
# After distillation, a full MobileSAM checkpoint is assembled and logged (see model.mobile_sam_checkpoint).

training:
  mode: encoder_distill

# Path to MobileSAM package root (directory containing mobile_sam/). If null, uses env
# MOBILESAM_ROOT or sibling ../MobileSAM-pytorch/MobileSAM next to this repo.
mobilesam_root: null

data:
  # layout: colocated  -> root/shard/{jpg,npy together}
  # layout: split_teacher -> image_root/shard/*.jpg + teacher_root/shard/*.npy (same stem)
  layout: colocated
  root: /data
  shard_dirs:
    - sa_000000
  image_size: 1024
  seed: 42
  train_frac: 0.7
  val_frac: 0.1
  test_frac: 0.2
  # Set to an existing JSON manifest to freeze splits across runs; otherwise written to output.dir
  split_manifest: null
  num_workers: 4
  # Optional: SA-1B-style JSON masks (COCO RLE) for test IoU after encoder run
  # annotation_root: /data/annotations

sam:
  multimask_output: false

model:
  # Required for encoder_distill / exports: MobileSAM .pt (prompt + decoder); merge trained TinyViT in.
  mobile_sam_checkpoint: /path/to/mobile_sam.pt
  img_size: 1024
  in_chans: 3
  num_classes: 1000
  embed_dims: [64, 128, 160, 320]
  depths: [2, 2, 6, 2]
  num_heads: [2, 4, 5, 10]
  window_sizes: [7, 7, 14, 7]
  mlp_ratio: 4.0
  drop_rate: 0.0
  drop_path_rate: 0.0
  use_checkpoint: false
  mbconv_expand_ratio: 4.0
  local_conv_size: 3
  layer_lr_decay: 0.8

train:
  epochs: 8
  batch_size: 8
  optimizer: sgd
  learning_rate: 0.05
  weight_decay: 0.0005
  momentum: 0.9
  scheduler_gamma: 0.5
  log_interval_batches: 50
  # tqdm progress (rank 0 only when using torchrun)
  show_progress: true
  # nccl often works on ROCm (RCCL); use gloo if you hit backend errors on AMD.
  distributed_backend: nccl

mlflow:
  tracking_uri: http://129.114.27.248:8000
  experiment_name: immich-sticker-encoder
  run_name: null

output:
  dir: /tmp/immich_sticker_training_out
