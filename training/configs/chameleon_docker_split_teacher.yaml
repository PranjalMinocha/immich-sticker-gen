# Chameleon: after setup_host.sh, bind-mount LOCAL_DATA_ROOT at /data in Docker (see training/README.md).
# layout split_teacher: JPEGs under .../Raw-Data/extracted/<shard>/ ; teacher .npy under .../Teacher-Embeddings/<shard>/
# If the tarball adds an extra top-level directory, set image_root to that path instead.

training:
  mode: encoder_distill

mobilesam_root: null

data:
  layout: split_teacher
  image_root: /data/Raw-Data/extracted
  teacher_root: /data/Teacher-Embeddings
  shard_dirs:
    - sa_000000
  image_size: 1024
  seed: 42
  train_frac: 0.7
  val_frac: 0.1
  test_frac: 0.2
  split_manifest: null
  num_workers: 4

model:
  # false = random-init SAM for merge/export (no .pt); omit mobile_sam_checkpoint
  load_pretrained: true
  mobile_sam_checkpoint: /path/to/mobile_sam.pt
  img_size: 1024
  in_chans: 3
  num_classes: 1000
  embed_dims: [64, 128, 160, 320]
  depths: [2, 2, 6, 2]
  num_heads: [2, 4, 5, 10]
  window_sizes: [7, 7, 14, 7]
  mlp_ratio: 4.0
  drop_rate: 0.0
  drop_path_rate: 0.0
  use_checkpoint: false
  mbconv_expand_ratio: 4.0
  local_conv_size: 3
  layer_lr_decay: 0.8

train:
  epochs: 8
  batch_size: 8
  optimizer: sgd
  learning_rate: 0.05
  weight_decay: 0.0005
  momentum: 0.9
  scheduler_gamma: 0.5
  log_interval_batches: 50
  show_progress: true
  distributed_backend: nccl

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment_name: immich-sticker-encoder
  run_name: null

output:
  dir: /out
