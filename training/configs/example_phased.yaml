# Example: freeze TinyViT, tune decoder; then unfreeze all. Optional distilled encoder init.
# phased_finetune.init_encoder_from: path to tinyvit_encoder_only.pth from an encoder_distill run.

training:
  mode: phased_finetune

mobilesam_root: null

model:
  mobile_sam_checkpoint: /path/to/mobile_sam.pt

phased_finetune:
  init_encoder_from: null
  phases:
    - epochs: 2
      freeze_components: [image_encoder]
      learning_rate: 0.0001
      scheduler_gamma: 0.9
    - epochs: 4
      freeze_components: []
      learning_rate: 0.00002
      scheduler_gamma: 0.9

data:
  layout: colocated
  root: /data
  shard_dirs: [sa_000000]
  annotation_root: /data/annotations
  image_size: 1024
  seed: 42
  train_frac: 0.7
  val_frac: 0.1
  test_frac: 0.2
  num_workers: 4

sam:
  multimask_output: false

train:
  batch_size: 4
  optimizer: adamw
  weight_decay: 0.01
  log_interval_batches: 20
  show_progress: true
  distributed_backend: nccl

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment_name: immich-sticker-sam-phased
  run_name: null

output:
  dir: /tmp/immich_sticker_training_out
