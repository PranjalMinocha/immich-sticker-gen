services:
  # 1. DATA INGESTION (Phase 1)
  ingest-data:
    build: .
    env_file: .env
    volumes:
      - ./ingest_data.py:/app/ingest_data.py
    command: ["python", "ingest_data.py", "--url", "${INGEST_ARCHIVE_URL}"]

  # 2. DATA SPLITTING (Phase 1)
  split-data:
    build: .
    env_file: .env
    volumes:
      - ./split_data.py:/app/split_data.py
    command: ["python", "split_data.py", "--seed", "42"]
    depends_on:
      - ingest-data

  # 3. BACKEND API (Phase 2/3 + Online Features)
  dummy-api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./dummy_api.py:/app/dummy_api.py
      - ./live_drift.py:/app/live_drift.py
      - /home/cc/.sticker_rollback_state.json:/rollback_state.json:ro
    environment:
      ROLLBACK_STATE_PATH: /rollback_state.json
    networks:
      - default
      - immich_default
    command: ["uvicorn", "dummy_api:app", "--host", "0.0.0.0", "--port", "8000"]

  # 4. TRAFFIC GENERATOR (Simulating Users)
  traffic-generator:
    build: .
    env_file: .env
    volumes:
      - ./data_generator.py:/app/data_generator.py
    networks:
      - default
      - immich_default
    command: ["python", "data_generator.py"]
    depends_on:
      - dummy-api
    restart: on-failure

  # 5. BATCH PIPELINE (The Lakehouse Compiler)
  batch-pipeline:
    build: .
    env_file: .env
    volumes:
      - ./batch_pipeline.py:/app/batch_pipeline.py
      - .:/app
    profiles: ["batch"]
    command: ["python", "batch_pipeline.py"]

  # 6. RETRAINING TRIGGER (Threshold-based retrain orchestrator)
  retraining-trigger:
    build: .
    env_file: .env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /tmp/retraining_results:/tmp/retraining_results
      - /home/cc/my_object_store:/home/cc/my_object_store:ro
      - /home/cc/MobileSAM-pytorch:/home/cc/MobileSAM-pytorch:ro
      - /home/cc/immich-sticker-gen/training/configs:/home/cc/immich-sticker-gen/training/configs:ro
    profiles: ["batch"]
    command: ["python", "retraining_trigger.py", "--dry-run"]

  # 7. QC SCHEDULER (runs batch_pipeline.py on interval)
  qc-scheduler:
    build: .
    env_file: .env
    volumes:
      - .:/app
    networks:
      - default
      - immich_default
    profiles: ["auto"]
    command:
      - "bash"
      - "-lc"
      - "while true; do python batch_pipeline.py || true; sleep ${QC_INTERVAL_SECONDS:-300}; done"

  # 8. RETRAINING SCHEDULER (runs retraining_trigger.py on interval)
  retraining-scheduler:
    build: .
    env_file: .env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /tmp/retraining_results:/tmp/retraining_results
      - /home/cc/my_object_store:/home/cc/my_object_store:ro
      - /home/cc/MobileSAM-pytorch:/home/cc/MobileSAM-pytorch:ro
      - /home/cc/immich-sticker-gen/training/configs:/home/cc/immich-sticker-gen/training/configs:ro
    networks:
      - default
      - immich_default
    profiles: ["auto"]
    command:
      - "bash"
      - "-lc"
      - "while true; do python retraining_trigger.py || true; sleep ${RETRAIN_TRIGGER_INTERVAL_SECONDS:-900}; done"

  # 9. ROLLBACK MONITOR SCHEDULER (checks rollback conditions on interval)
  rollback-scheduler:
    build: .
    env_file: .env
    volumes:
      - .:/app
      - /home/cc/.sticker_rollback_state.json:/rollback_state.json
    environment:
      ROLLBACK_STATE_PATH: /rollback_state.json
      PROMETHEUS_URL: http://172.17.0.1:9090
    networks:
      - default
      - immich_default
    profiles: ["auto"]
    command:
      - "bash"
      - "-lc"
      - "while true; do python rollback_monitor.py check || true; sleep ${ROLLBACK_INTERVAL_SECONDS:-300}; done"

  # 10. FORCE ROLLBACK (manual one-shot rollback from host)
  force-rollback:
    build: .
    env_file: .env
    volumes:
      - .:/app
      - /home/cc/.sticker_rollback_state.json:/rollback_state.json
    environment:
      ROLLBACK_STATE_PATH: /rollback_state.json
      PROMETHEUS_URL: http://immich_prometheus:9090
      MLFLOW_TRACKING_URI: http://129.114.26.4:8000
      SERVING_RELOAD_URL: http://server:8000/reload
      SERVING_RELOAD_TOKEN: ${MODEL_RELOAD_TOKEN:-}
    networks:
      - default
      - immich_default
      - system_default
    profiles: ["batch"]
    command: ["python", "rollback_monitor.py", "force-rollback"]

  # 11. DRIFT DETECTOR BUILD (Reference artifact generation — run once)
  build-drift-detector:
    build: .
    env_file: .env
    volumes:
      - ./build_live_drift_detector.py:/app/build_live_drift_detector.py
      - ./live_drift.py:/app/live_drift.py
    profiles: ["batch"]
    command: ["python", "build_live_drift_detector.py"]

  # 11. SYNTHETIC USER SEEDING (one-time helper)
  seed-synthetic-users:
    build: .
    env_file: .env
    volumes:
      - ./seed_synthetic_users.py:/app/seed_synthetic_users.py
    networks:
      - default
      - immich_default
    profiles: ["seed"]
    command: ["python", "seed_synthetic_users.py", "--opt-in-count", "5000", "--opt-out-count", "1000"]

networks:
  default:
  immich_default:
    external: true
  system_default:
    external: true
