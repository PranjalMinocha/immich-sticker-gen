services:
  # 1. DATA INGESTION (Phase 1)
  ingest-data:
    build: .
    env_file: .env
    volumes:
      - ./ingest_data.py:/app/ingest_data.py
    command: ["python", "ingest_data.py", "--url", "${INGEST_ARCHIVE_URL}"]
  # 2. DATA SPLITTING (Phase 1)
  split-data:
    build: .
    env_file: .env
    volumes:
      - ./split_data.py:/app/split_data.py
    command: ["python", "split_data.py", "--seed", "42"]
    depends_on:
      - ingest-data

  # 3. BACKEND API (Phase 2/3 + Online Features)
  dummy-api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./dummy_api.py:/app/dummy_api.py
      - ./live_drift.py:/app/live_drift.py
    networks:
      - default
      - immich_default
    command: ["uvicorn", "dummy_api:app", "--host", "0.0.0.0", "--port", "8000"]
  # 4. PROMETHEUS (Live metrics scraping)
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    depends_on:
      - dummy-api

  # 5. GRAFANA (Dashboards)
  grafana:
    image: grafana/grafana-oss:10.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # 6. TRAFFIC GENERATOR (Simulating Users)
  traffic-generator:
    build: .
    env_file: .env
    volumes:
      - ./data_generator.py:/app/data_generator.py
    networks:
      - default
      - immich_default
    command: ["python", "data_generator.py"]
    depends_on:
      - dummy-api

  # 7. BATCH PIPELINE (The Lakehouse Compiler)
  batch-pipeline:
    build: .
    env_file: .env
    volumes:
      - ./batch_pipeline.py:/app/batch_pipeline.py
      - .:/app
    # We use 'run' instead of 'up' for this, or leave it for manual triggers
    profiles: ["batch"] 
    command: ["python", "batch_pipeline.py"]
  # 8. RETRAINING TRIGGER (Threshold-based retrain orchestrator)
  retraining-trigger:
    build: .
    env_file: .env
    volumes:
      - ./retraining_trigger.py:/app/retraining_trigger.py
      - ./retraining_trigger_logic.py:/app/retraining_trigger_logic.py
      - ./model_source_resolver.py:/app/model_source_resolver.py
      - ./model_deployer.py:/app/model_deployer.py
      - .:/app
    profiles: ["batch"]
    command: ["python", "retraining_trigger.py", "--dry-run"]

  qc-scheduler:
    build: .
    env_file: .env
    volumes:
      - ./batch_pipeline.py:/app/batch_pipeline.py
      - .:/app
    profiles: ["auto"]
    command:
      - "bash"
      - "-lc"
      - "while true; do python batch_pipeline.py || true; sleep ${QC_INTERVAL_SECONDS:-300}; done"

  retraining-scheduler:
    build: .
    env_file: .env
    volumes:
      - ./retraining_trigger.py:/app/retraining_trigger.py
      - ./retraining_trigger_logic.py:/app/retraining_trigger_logic.py
      - ./model_source_resolver.py:/app/model_source_resolver.py
      - ./model_deployer.py:/app/model_deployer.py
      - .:/app
    profiles: ["auto"]
    command:
      - "bash"
      - "-lc"
      - "while true; do python retraining_trigger.py || true; sleep ${RETRAIN_TRIGGER_INTERVAL_SECONDS:-300}; done"
  # 9. DRIFT DETECTOR BUILD (Reference artifact generation)
  build-drift-detector:
    build: .
    env_file: .env
    volumes:
      - ./build_live_drift_detector.py:/app/build_live_drift_detector.py
      - ./live_drift.py:/app/live_drift.py
    profiles: ["batch"]
    command: ["python", "build_live_drift_detector.py"]

  # 10. SYNTHETIC USER SEEDING (one-time helper)
  seed-synthetic-users:
    build: .
    env_file: .env
    volumes:
      - ./seed_synthetic_users.py:/app/seed_synthetic_users.py
    networks:
      - default
      - immich_default
    profiles: ["seed"]
    command: ["python", "seed_synthetic_users.py", "--opt-in-count", "5000", "--opt-out-count", "1000"]

volumes:
  grafana_data:

networks:
  default:
  immich_default:
    external: true
