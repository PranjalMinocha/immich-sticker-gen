services:
  # 1. DATABASE (Source of Truth)
  postgres:
    image: postgres:15-alpine
    container_name: sticker-db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. DATABASE GUI (View tables at http://<ip>:8081)
  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  # 3. DATA INGESTION (Phase 1)
  ingest-data:
    build: .
    env_file: .env
    volumes:
      - ./ingest_data.py:/app/ingest_data.py
    command: ["python", "ingest_data.py"]
    depends_on:
      - postgres

  # 4. DATA SPLITTING (Phase 1)
  split-data:
    build: .
    env_file: .env
    volumes:
      - ./split_data.py:/app/split_data.py
    command: ["python", "split_data.py", "--seed", "42"]
    depends_on:
      - ingest-data

  # 7. BACKEND API (Phase 2/3 + Online Features)
  dummy-api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./dummy_api.py:/app/dummy_api.py
    command: ["uvicorn", "dummy_api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - postgres

  # 8. TRAFFIC GENERATOR (Simulating Users)
  traffic-generator:
    build: .
    env_file: .env
    volumes:
      - ./data_generator.py:/app/data_generator.py
    command: ["python", "data_generator.py"]
    depends_on:
      - dummy-api

  # 9. BATCH PIPELINE (The Lakehouse Compiler)
  batch-pipeline:
    build: .
    env_file: .env
    volumes:
      - ./batch_pipeline.py:/app/batch_pipeline.py
      - .:/app
    # We use 'run' instead of 'up' for this, or leave it for manual triggers
    profiles: ["batch"] 
    command: ["python", "batch_pipeline.py"]
    depends_on:
      - postgres

volumes:
  pg_data: