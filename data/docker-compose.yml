services:
  ingest-data:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./ingest_data.py:/app/ingest_data.py
    command: ["python", "ingest_data.py"]

  split-data:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./split_data.py:/app/split_data.py
    command: ["python", "split_data.py", "--seed", "42"]

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sticker_gen
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  dummy-api:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./dummy_api.py:/app/dummy_api.py
    command: ["uvicorn", "dummy_api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - postgres

  traffic-generator:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data_generator.py:/app/data_generator.py
    command: ["python", "data_generator.py"]
    depends_on:
      - dummy-api

# Declare the persistent volume for the database
volumes:
  pg_data: