version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Experiment progression:
#
#   Stage 1 — FastAPI + ONNX on CPU (baseline)
#             fastapi_serial, fastapi_concurrent, fastapi_poisson
#
#   Stage 2 — Triton GPU, 1 instance, no dynamic batching
#             triton_gpu1_serial, triton_gpu1_concurrent, triton_gpu1_poisson
#
#   Stage 3 — Triton GPU, 2 instances, no dynamic batching
#             triton_gpu2_concurrent, triton_gpu2_poisson
#
#   Stage 4 — Triton GPU, 1 instance + dynamic batching
#             triton_dynbatch_poisson
#
# Run:
#   docker compose up init
#   docker compose up fastapi_server triton_server -d
#   docker compose run --rm fastapi_serial && \
#   docker compose run --rm fastapi_concurrent && \
#   docker compose run --rm fastapi_poisson && \
#   docker compose run --rm triton_gpu1_serial && \
#   docker compose run --rm triton_gpu1_concurrent && \
#   docker compose run --rm triton_gpu1_poisson && \
#   docker compose run --rm triton_gpu2_concurrent && \
#   docker compose run --rm triton_gpu2_poisson && \
#   docker compose run --rm triton_dynbatch_poisson
# ─────────────────────────────────────────────────────────────────────────────

x-gpu: &gpu
  devices:
    - /dev/kfd
    - /dev/dri
  group_add:
    - video
    - render

x-client-base: &client-base
  build:
    context: .
    dockerfile: Dockerfile.client
  volumes:
    - serving_data:/data
  environment:
    DATA_DIR:          /data
    NUM_SERIAL_TRIALS: "100"
    NUM_CONCURRENT:    "8"
    CONCURRENT_REQS:   "200"
    RATE_REQS_PER_SEC: "5.0"
    RATE_DURATION_SEC: "30.0"

services:

  # ── init: download data + export ONNX models (run once) ───────────────────
  init:
    build:
      context: ..
      dockerfile: system/Dockerfile.init
    volumes:
      - serving_data:/data
    environment:
      DATA_DIR:  /data
      MODEL_DIR: /data

  # ── Stage 1: FastAPI server (CPU) ─────────────────────────────────────────
  fastapi_server:
    <<: *gpu
    build:
      context: ..
      dockerfile: system/fastapi_app/Dockerfile
    entrypoint: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - serving_data:/data
    environment:
      MODEL_DIR: /data
      MIOPEN_FIND_MODE: "1"
      MIOPEN_USER_DB_PATH: /tmp/miopen
      MIOPEN_SYSTEM_DB_PATH: /tmp/miopen
    ports:
      - "8000:8000"
    depends_on:
      init:
        condition: service_completed_successfully

  # ── Stage 2-4: Triton server (GPU, loads all 3 model variants) ────────────
  triton_server:
    <<: *gpu
    build:
      context: .
      dockerfile: Dockerfile.triton
    volumes:
      - serving_data:/data
      - ./triton_models:/models
    environment:
      MODEL_DIR: /data
      MIOPEN_FIND_MODE: "1"
      MIOPEN_USER_DB_PATH: /tmp/miopen
      MIOPEN_SYSTEM_DB_PATH: /tmp/miopen
    ports:
      - "8001:8000"
      - "8002:8001"
      - "8003:8002"
    depends_on:
      init:
        condition: service_completed_successfully

  # ── Stage 1 clients: FastAPI CPU ──────────────────────────────────────────
  fastapi_serial:
    <<: *client-base
    environment:
      DATA_DIR:          /data
      FASTAPI_URL:       http://fastapi_server:8000/predict
      EXPERIMENT:        fastapi_serial
      NUM_SERIAL_TRIALS: "100"

  fastapi_concurrent:
    <<: *client-base
    environment:
      DATA_DIR:        /data
      FASTAPI_URL:     http://fastapi_server:8000/predict
      EXPERIMENT:      fastapi_concurrent
      NUM_CONCURRENT:  "8"
      CONCURRENT_REQS: "200"

  fastapi_poisson:
    <<: *client-base
    environment:
      DATA_DIR:          /data
      FASTAPI_URL:       http://fastapi_server:8000/predict
      EXPERIMENT:        fastapi_poisson
      RATE_REQS_PER_SEC: "5.0"
      RATE_DURATION_SEC: "30.0"

  # ── Stage 2 clients: Triton GPU, 1 instance ───────────────────────────────
  triton_gpu1_serial:
    <<: *client-base
    environment:
      DATA_DIR:          /data
      TRITON_URL:        triton_server:8000
      TRITON_MODEL:      mobile_sam_gpu_1
      EXPERIMENT:        triton_serial
      NUM_SERIAL_TRIALS: "100"

  triton_gpu1_concurrent:
    <<: *client-base
    environment:
      DATA_DIR:        /data
      TRITON_URL:      triton_server:8000
      TRITON_MODEL:    mobile_sam_gpu_1
      EXPERIMENT:      triton_concurrent
      NUM_CONCURRENT:  "8"
      CONCURRENT_REQS: "200"

  triton_gpu1_poisson:
    <<: *client-base
    environment:
      DATA_DIR:          /data
      TRITON_URL:        triton_server:8000
      TRITON_MODEL:      mobile_sam_gpu_1
      EXPERIMENT:        triton_poisson
      RATE_REQS_PER_SEC: "5.0"
      RATE_DURATION_SEC: "30.0"

  # ── Stage 3 clients: Triton GPU, 2 instances ──────────────────────────────
  triton_gpu2_concurrent:
    <<: *client-base
    environment:
      DATA_DIR:        /data
      TRITON_URL:      triton_server:8000
      TRITON_MODEL:    mobile_sam_gpu_2
      EXPERIMENT:      triton_concurrent
      NUM_CONCURRENT:  "8"
      CONCURRENT_REQS: "200"

  triton_gpu2_poisson:
    <<: *client-base
    environment:
      DATA_DIR:          /data
      TRITON_URL:        triton_server:8000
      TRITON_MODEL:      mobile_sam_gpu_2
      EXPERIMENT:        triton_poisson
      RATE_REQS_PER_SEC: "5.0"
      RATE_DURATION_SEC: "30.0"

  # ── Stage 4 clients: Triton GPU, 1 instance + dynamic batching ────────────
  triton_dynbatch_poisson:
    <<: *client-base
    environment:
      DATA_DIR:          /data
      TRITON_URL:        triton_server:8000
      TRITON_MODEL:      mobile_sam_gpu_dynbatch
      EXPERIMENT:        triton_poisson
      RATE_REQS_PER_SEC: "5.0"
      RATE_DURATION_SEC: "30.0"

volumes:
  serving_data:
