# serving/system/serve_config.yaml
# Ray Serve application config — used by pipeline.py to deploy the model.
# Can also be applied manually:
#   serve deploy serve_config.yaml --address http://ray-head:8265

applications:
  - name: immich-sticker-gen
    route_prefix: /
    import_path: fastapi_app.app:sticker_gen_app
    deployments:
      - name: StickerGenModel
        num_replicas: 1
        ray_actor_options:
          num_gpus: 1
