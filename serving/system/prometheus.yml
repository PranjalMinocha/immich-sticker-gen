global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: sticker_serving
    static_configs:
      - targets: ["server:8000"]
    metrics_path: /metrics

  - job_name: sticker_dummy_api
    static_configs:
      - targets: ["172.17.0.1:8000"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
