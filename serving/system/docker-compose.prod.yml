# serving/system/docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────────────────────
# Production serving stack:
#   - FastAPI inference server
#   - MinIO (object store) + init + Ceph sync
#   - Adminer (DB browser)
#   - Prometheus (scrapes server + dummy-api)
#   - Grafana (dashboards)
#
# MinIO, Adminer, and Grafana join immich_default so they can reach
# the immich postgres/server containers by name.
#
# Endpoints:
#   FastAPI      http://localhost:8004
#   MinIO UI     http://localhost:9001
#   Adminer      http://localhost:8080
#   Prometheus   http://localhost:9090
#   Grafana      http://localhost:3000  (admin / admin)

services:
  server:
    build:
      context: ..
      dockerfile: system/fastapi_app/Dockerfile.pytorch
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint:
      [
        "uvicorn",
        "fastapi_app.app:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--workers", "1",
      ]
    volumes:
      - model_data:/data
    environment:
      CKPT_PATH: /data/mobile_sam.pt
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://129.114.26.4:8000}
      MODEL_REGISTRY_NAME: ${MODEL_REGISTRY_NAME:-immich-sticker-mobilesam}
      MODEL_REGISTRY_ALIAS: ${MODEL_REGISTRY_ALIAS:-Production}
      BOOTSTRAP_MODEL_URI: ${BOOTSTRAP_MODEL_URI:-mlflow-artifacts:/2/94d1e731c6f64307908d893c9b1476dc/artifacts/checkpoints/mobile_sam_full.pt}
      PRETRAINED_MODEL_S3_URI: ${PRETRAINED_MODEL_S3_URI:-s3://objstore-proj28/models/production/mobile_sam.pt}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://chi.tacc.chameleoncloud.org:7480}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      MODEL_RELOAD_TOKEN: ${MODEL_RELOAD_TOKEN:-}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    ports:
      - "8004:8000"
    restart: always

  minio:
    container_name: immich_minio
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LOCAL_MINIO_ACCESS_KEY:-immich}
      MINIO_ROOT_PASSWORD: ${LOCAL_MINIO_SECRET_KEY:-immich_minio_secret}
    volumes:
      - minio_data:/data
    # minio_data is declared external below and maps to the original immich_minio-data
    # volume so that user uploads are preserved across stack reorganisations.
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - default
      - immich_default
    restart: always
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    container_name: immich_minio_init
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      LOCAL_MINIO_ACCESS_KEY: ${LOCAL_MINIO_ACCESS_KEY:-immich}
      LOCAL_MINIO_SECRET_KEY: ${LOCAL_MINIO_SECRET_KEY:-immich_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-objstore-proj28}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$LOCAL_MINIO_ACCESS_KEY $$LOCAL_MINIO_SECRET_KEY;
        mc mb --ignore-existing local/$$MINIO_BUCKET;
        exit 0;
      "
    restart: 'no'

  minio-ceph-sync:
    container_name: immich_minio_ceph_sync
    image: minio/mc
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      LOCAL_MINIO_ACCESS_KEY: ${LOCAL_MINIO_ACCESS_KEY:-immich}
      LOCAL_MINIO_SECRET_KEY: ${LOCAL_MINIO_SECRET_KEY:-immich_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-objstore-proj28}
      CEPH_ENDPOINT: ${STICKER_S3_ENDPOINT:-https://chi.tacc.chameleoncloud.org:7480}
      CEPH_ACCESS_KEY: ${STICKER_S3_ACCESS_KEY:-}
      CEPH_SECRET_KEY: ${STICKER_S3_SECRET_KEY:-}
      CEPH_BUCKET: ${STICKER_S3_BUCKET:-objstore-proj28}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$LOCAL_MINIO_ACCESS_KEY $$LOCAL_MINIO_SECRET_KEY &&
        mc alias set ceph $$CEPH_ENDPOINT $$CEPH_ACCESS_KEY $$CEPH_SECRET_KEY --insecure &&
        while true; do
          mc mirror --insecure --exclude 'images/*' --exclude 'annotations/*' --exclude 'Raw-Data/*' --exclude 'Teacher-Embeddings/*' --exclude 'iceberg_warehouse/*' --exclude 'user_uploads/*' --exclude 'https:/*' ceph/$$CEPH_BUCKET local/$$MINIO_BUCKET || true;
          sleep 60;
        done
      "
    restart: always

  adminer:
    container_name: immich_adminer
    image: adminer:latest
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: database
    networks:
      - default
      - immich_default
    restart: always

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: immich_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:10.4.3
    container_name: immich_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_DEFAULT_THEME: dark
      POSTGRES_HOST: immich_postgres
      POSTGRES_DB: ${POSTGRES_DB:-immich}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - default
      - immich_default
    depends_on:
      - prometheus
    restart: always

volumes:
  model_data:
  minio_data:
    external: true
    name: immich_minio-data
  prometheus_data:
  grafana_data:

networks:
  default:
  immich_default:
    external: true
