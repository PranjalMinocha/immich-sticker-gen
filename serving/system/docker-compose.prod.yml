# serving/system/docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────────────────────
# Simple prod setup: download checkpoint → serve with FastAPI + PyTorch
#
# Startup:
#   docker compose -f docker-compose.prod.yml up
#
# Endpoints:
#   predict / health   http://localhost:8000
# ─────────────────────────────────────────────────────────────────────────────

services:
  model-init:
    image: python:3.10-slim
    volumes:
      - model_data:/data
      - ./model-init.sh:/model-init.sh:ro
    command: ["sh", "/model-init.sh"]

  server:
    build:
      context: ..
      dockerfile: system/fastapi_app/Dockerfile.pytorch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint:
      [
        "uvicorn",
        "fastapi_app.app:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--workers", "1",
      ]
    volumes:
      - model_data:/data
    environment:
      CKPT_PATH: /data/mobile_sam.pt
    ports:
      - "8004:8000"
    depends_on:
      model-init:
        condition: service_completed_successfully

volumes:
  model_data:
